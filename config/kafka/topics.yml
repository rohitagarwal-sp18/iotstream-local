topics:
  - name: iot.sensors.raw
    partitions: 3
    replication_factor: 1
    config:
      retention.ms: 604800000     # 7 days
      cleanup.policy: delete

  - name: iot.sensors.dead-letter
    partitions: 1
    replication_factor: 1
    config:
      retention.ms: 2592000000    # 30 days — keep bad events longer for investigation
      cleanup.policy: delete
