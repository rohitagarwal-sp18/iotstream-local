# Iceberg + Kafka + S3A packages — downloaded from Maven on first spark-submit
spark.jars.packages=org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262

# Register Iceberg Spark extensions
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Iceberg catalog — Hadoop catalog backed by MinIO (S3-compatible)
spark.sql.catalog.iotstream=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iotstream.type=hadoop
spark.sql.catalog.iotstream.warehouse=s3a://iotstream-warehouse/

# MinIO / S3A configuration
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=minioadmin
spark.hadoop.fs.s3a.secret.key=minioadmin
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled=false
spark.hadoop.fs.s3a.fast.upload=true

# Streaming checkpoint location
spark.sql.streaming.checkpointLocation=s3a://iotstream-checkpoints/

# Serialization
spark.serializer=org.apache.spark.serializer.KryoSerializer
