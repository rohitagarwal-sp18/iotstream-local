# Spark 4.0 + Scala 2.13 packages — downloaded from Maven on first spark-submit
spark.jars.packages=org.apache.iceberg:iceberg-spark-runtime-4.0_2.13:1.10.1,org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.0,org.apache.hadoop:hadoop-aws:3.4.1,com.amazonaws:aws-java-sdk-bundle:1.12.262

# Register Iceberg Spark extensions
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Iceberg catalog — REST catalog (shared with Trino)
spark.sql.catalog.iotstream=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iotstream.type=rest
spark.sql.catalog.iotstream.uri=http://iceberg-rest:8181

# MinIO / S3A configuration (Hadoop SDK v1 — used for checkpoints, bronze reads)
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=minioadmin
spark.hadoop.fs.s3a.secret.key=minioadmin
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled=false
spark.hadoop.fs.s3a.fast.upload=true

# Iceberg S3FileIO configuration (AWS SDK v2 — used by iceberg-aws for data files)
spark.sql.catalog.iotstream.s3.endpoint=http://minio:9000
spark.sql.catalog.iotstream.s3.access-key-id=minioadmin
spark.sql.catalog.iotstream.s3.secret-access-key=minioadmin
spark.sql.catalog.iotstream.s3.path-style-access=true
spark.sql.catalog.iotstream.client.region=us-east-1

# Streaming checkpoint location
spark.sql.streaming.checkpointLocation=s3a://iotstream-checkpoints/

