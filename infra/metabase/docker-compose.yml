services:
  metabase:
    image: metabase/metabase:latest
    container_name: iotstream-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      JAVA_TIMEZONE: UTC
    volumes:
      - metabase-data:/metabase-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - iotstream-network

volumes:
  metabase-data:

networks:
  iotstream-network:
    external: true
