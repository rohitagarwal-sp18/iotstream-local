services:
  spark-master:
    image: bitnami/spark:3.5
    container_name: iotstream-spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_WEBUI_PORT: 8081
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8081:8081"
    volumes:
      - ../../pipeline:/opt/spark/pipeline
      - ../../config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - spark-ivy-cache:/opt/bitnami/spark/.ivy2
    networks:
      - iotstream-network

  spark-worker:
    image: bitnami/spark:3.5
    container_name: iotstream-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_WEBUI_PORT: 8082
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "8082:8082"
    depends_on:
      - spark-master
    volumes:
      - ../../pipeline:/opt/spark/pipeline
      - ../../config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - spark-ivy-cache:/opt/bitnami/spark/.ivy2
    networks:
      - iotstream-network

volumes:
  spark-ivy-cache:

networks:
  iotstream-network:
    external: true
